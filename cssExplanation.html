<!DOCTYPE html>

    <title>css</title>
    <link rel="stylesheet" href="style.css">

    <style> 
       /* Selector */
        /* internal css */
        h1{
             font-style: italic; 
              color: rgb(16, 24, 141); 
        }
       
        p{   
             color: rgb(245, 241, 241);
            background-color: rgb(0, 0, 0); 
        
        }
        /*class selector(group the elements)*/
        .title{
            color: aquamarine;
        }
                 h1,p,button{
        
            color: rgb(34, 133, 172);
        }
         /*desendent selectors*/
        div li{
            color: rgb(255, 83, 3);
        }
        div > li{
            color: aquamarine;
        }
         /*attribute selector*/
         input[type="text"]{
            background-color: blueviolet;
         }
       
    
      
        
    </style>
</head>
