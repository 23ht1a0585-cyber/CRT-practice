<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Restaurant</title>


    <link rel="stylesheet" href="resturant.css">
</head>
<body>


    <header>
        <div class="header">
            <div class="logo-area">
                <img src="download.1.png">
                <h1>Foodie Restaurant</h1>
            </div>
            <nav>
                <a href="#home">Home</a>
                <a href="#about">About Us</a>
                <a href="#chefs">Chefs</a>
                <a href="#menu">Menu</a>
                <a href="#gallery">Gallery</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <section class="bala" id="home">
        <div class="bala-content">
            <h2>Welcome to Foodie's Mela</h2>
            <p>Delicious Food | Fresh Ingredients | Great Taste</p>
            <button class="order-btn">Order Now</button>
        </div>
    </section>


    <section class="menu-section" 
    id="menu">
        <h2 class="section-title">Our Popular Dishes</h2>
        <div class="menu-grid">
            
            <div class="menu-card">
                <div class="card-img-container">
                    <img src="pizza.jpg" alt="Pizza">
                </div>
                <div class="card-info">
                    <h3>Pizza</h3>
                </div>
            </div>

          
             <div class="menu-card">
                <div class="card-img-container">
                    <img src="biriyani.jpg" alt="Biriyani">
                </div>
                <div class="card-info">
                    <h3>Biriyani</h3>
                </div>
            </div> 

   
             <div class="menu-card">
                <div class="card-img-container">
                    <img src="bb.jpg" alt="Chicken Wings">
                </div>
                <div class="card-info">
                    <h3>Chicken Wings</h3>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
